# Syncs elcruzo/trace-win-builder → buildwithtrace/win-builder on push to main.
name: Sync to Organization

on:
  push:
    branches: [main]

jobs:
  sync:
    if: github.repository_owner == 'elcruzo'
    runs-on: ubuntu-latest
    steps:
      - name: Clone and push to org
        env:
          ORG_PUSH_TOKEN: ${{ secrets.ORG_PUSH_TOKEN }}
        run: |
          git clone --no-checkout --filter=blob:none https://x-access-token:${ORG_PUSH_TOKEN}@github.com/elcruzo/trace-win-builder.git repo
          cd repo
          git checkout main
          git remote add org https://x-access-token:${ORG_PUSH_TOKEN}@github.com/buildwithtrace/win-builder.git
          git push org main:main --force
