# For builders, org (buildwithtrace) is primary. This workflow lives on BOTH
# repos. On the org repo it syncs to personal. On the personal repo it's a no-op
# (the `if` guard skips it).
#
# The org repo's copy of this file triggers on push and syncs to personal.
# To bootstrap: push this file to the org repo manually once.
name: Sync Builder

on:
  push:
    branches: [main]

jobs:
  sync-to-personal:
    if: github.repository == 'buildwithtrace/win-builder'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.PERSONAL_PUSH_TOKEN }}

      - name: Push to personal repo
        env:
          PERSONAL_PUSH_TOKEN: ${{ secrets.PERSONAL_PUSH_TOKEN }}
        run: |
          git remote add personal https://x-access-token:${PERSONAL_PUSH_TOKEN}@github.com/elcruzo/trace-win-builder.git
          git push personal HEAD:main --force

  sync-to-org:
    if: github.repository == 'elcruzo/trace-win-builder'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.ORG_PUSH_TOKEN }}

      - name: Push to org repo
        env:
          ORG_PUSH_TOKEN: ${{ secrets.ORG_PUSH_TOKEN }}
        run: |
          git remote add org https://x-access-token:${ORG_PUSH_TOKEN}@github.com/buildwithtrace/win-builder.git
          git push org HEAD:main --force
